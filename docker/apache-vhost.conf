<VirtualHost *:80>
    ServerAdmin dev@localhost
    DocumentRoot /var/www/playanimaster/public_html

    <Directory /var/www/playanimaster/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/animaster-error.log
    CustomLog ${APACHE_LOG_DIR}/animaster-access.log combined
</VirtualHost>
