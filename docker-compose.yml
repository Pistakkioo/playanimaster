services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./public_html:/var/www/playanimaster/public_html
      - ./private_functions:/var/www/playanimaster/private_functions
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-playanimaster_db}
      DB_USER: ${MYSQL_USER:-animaster}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change_me_app}
      DEV_ADMIN_TOKEN: ${DEV_ADMIN_TOKEN:-change_me_dev_only}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-playanimaster_db}
      MYSQL_USER: ${MYSQL_USER:-animaster}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app}
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      - db
